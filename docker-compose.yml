services:
  postgres:
    image: postgres:16-alpine
    container_name: odeoniflow-postgres
    environment:
      POSTGRES_USER: odeoniflow
      POSTGRES_PASSWORD: odeoniflow
      POSTGRES_DB: odeoniflow
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - odeoniflow-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odeoniflow -d odeoniflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: odeoniflow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  odeoniflow-postgres:
